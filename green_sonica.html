<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GREEN SONICA</title>
<link href="https://fonts.googleapis.com/css2?family=Josefin+Sans:wght@700&family=Noto+Serif+JP:wght@400;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #808080;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: "MS Gothic", "ＭＳ ゴシック", monospace;
  }

  .ts-wrap {
    background: #fff;
    color: #000;
    font-size: 14px;
    line-height: 1.8;
    width: 600px;
    max-width: 98vw;
    padding: 16px;
    border: 1px solid #999;
    box-shadow: 4px 4px 0 #444;
  }

  .ts-top {
    background: #1a5c1a;
    color: #ccffcc;
    text-align: center;
    font-size: 24px;
    padding: 8px 0;
    letter-spacing: 8px;
    font-family: 'Josefin Sans', sans-serif;
    font-weight: 700;
  }

  .ts-rule        { border: none; border-top: 1px solid #7ab87a; margin: 8px 0; }
  .ts-rule-double { border: none; border-top: 3px double #2d7a2d; margin: 8px 0; }

  .ts-center { text-align: center; }
  .ts-sub    { font-size: 11px; color: #3a7a3a; letter-spacing: 3px; }

  .ts-section-title {
    background: #1a5c1a;
    color: #ccffcc;
    padding: 2px 8px;
    font-size: 13px;
    letter-spacing: 2px;
    display: inline-block;
    margin: 12px 0 6px;
  }

  .ts-body-text {
    font-family: "ＭＳ 明朝", "Noto Serif JP", serif;
    font-size: 13px;
    line-height: 2;
    color: #222;
    margin: 0 0 10px;
    padding: 0 4px;
  }

  /* ── カルーセル ── */
  .carousel-area {
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 14px 0 4px;
    position: relative;
    height: 140px;
  }

  .carousel-btn {
    background: #f0faf0;
    border: 1px solid #2d7a2d;
    width: 28px; height: 28px;
    font-size: 14px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    color: #1a5c1a;
    flex-shrink: 0;
    font-family: monospace;
    user-select: none;
  }
  .carousel-btn:hover { background: #d4efd4; }

  .carousel-track {
    display: flex;
    align-items: center;
    justify-content: center;
    flex: 1;
    position: relative;
    height: 140px;
    overflow: hidden;
  }

  .icon-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    position: absolute;
    transition: all 0.3s ease;
    cursor: default;
    user-select: none;
  }

  .icon-item.center  { transform: scale(1) translateX(0);       opacity: 1;    z-index: 3; cursor: pointer; }
  .icon-item.left1   { transform: translateX(-115px) scale(0.65); opacity: 0.4;  z-index: 2; }
  .icon-item.left2   { transform: translateX(-195px) scale(0.45); opacity: 0.18; z-index: 1; }
  .icon-item.right1  { transform: translateX(115px)  scale(0.65); opacity: 0.4;  z-index: 2; }
  .icon-item.right2  { transform: translateX(195px)  scale(0.45); opacity: 0.18; z-index: 1; }
  .icon-item.hidden  { opacity: 0; z-index: 0; pointer-events: none; }

  .icon-img {
    width: 64px; height: 64px;
    border: 1px solid #7ab87a;
    background: #f8fff8;
    display: flex; align-items: center; justify-content: center;
    font-size: 34px;
  }
  .icon-item.center .icon-img {
    border: 2px solid #1a5c1a;
    background: #f0faf0;
  }

  .icon-label {
    font-family: "MS Gothic", monospace;
    font-size: 12px;
    color: #000;
    margin-top: 5px;
    white-space: nowrap;
    max-width: 100px;
    text-align: center;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .icon-item.center .icon-label {
    color: #1a5c1a;
    font-weight: bold;
    text-decoration: underline;
    font-size: 13px;
  }

  .icon-desc {
    font-size: 10px;
    color: #555;
    text-align: center;
    white-space: nowrap;
    max-width: 120px;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-top: 2px;
    font-family: "MS Gothic", monospace;
  }
  .icon-item.center .icon-desc { color: #2d7a2d; }

  .click-hint {
    font-family: "MS Gothic", monospace;
    font-size: 12px;
    color: #1a5c1a;
    text-align: center;
    margin: 6px 0 4px;
    animation: blink 1s step-end infinite;
    height: 18px;
    letter-spacing: 1px;
  }
  @keyframes blink {
    0%, 100% { visibility: visible; }
    50%       { visibility: hidden; }
  }

  .ts-status {
    background: #f0faf0;
    border: 1px solid #7ab87a;
    font-size: 11px;
    color: #2d7a2d;
    padding: 2px 8px;
    margin-top: 4px;
    font-family: monospace;
  }

  .ts-footer {
    text-align: center;
    font-size: 11px;
    color: #3a7a3a;
    margin-top: 14px;
    border-top: 1px dashed #7ab87a;
    padding-top: 6px;
  }
  .ts-counter {
    display: inline-block;
    background: #1a5c1a;
    color: #ccffcc;
    font-family: monospace;
    font-size: 13px;
    padding: 1px 6px;
    letter-spacing: 2px;
  }
</style>
</head>
<body>

<div class="ts-wrap">
  <div class="ts-top">GREEN SONICA</div>

  <hr class="ts-rule-double">
  <div class="ts-center"><span class="ts-sub">― WELCOME TO MY HOMEPAGE ―</span></div>
  <hr class="ts-rule">

  <span class="ts-section-title">■ MENU</span>

  <div class="carousel-area">
    <button class="carousel-btn" id="btn-left" aria-label="左へ">◀</button>
    <div class="carousel-track" id="track"></div>
    <button class="carousel-btn" id="btn-right" aria-label="右へ">▶</button>
  </div>

  <div class="click-hint">[ CLICK TO ENTER ]</div>
  <div class="ts-status" id="status-text">▶ Ready.</div>

  <hr class="ts-rule">

  <span class="ts-section-title">■ ひとこと</span>
  <p class="ts-body-text">
    クリックしてくれてありがとうございます。<br>
    マイペースに更新していきます。
  </p>

  <hr class="ts-rule">

  <div class="ts-footer">
    アクセスカウンター：<span class="ts-counter">000001</span>
  </div>
</div>

<script>
  // ★ アイコン・ラベル・説明・URLをここで編集してください ★
  const items = [
    { emoji: '✨', label: 'シャニマス',    desc: 'シナリオ・ライブ感想', url: 'https://example.com/shani' },
    { emoji: '📝', label: '日記',          desc: 'noteへのリンク',       url: 'https://note.com/' },
    { emoji: '🌿', label: 'Green objects', desc: '緑のもの投稿 on X',    url: 'https://twitter.com/' },
    { emoji: '🍜', label: '花月',          desc: 'ラーメン花月レポ',     url: 'https://example.com/kagetsu' },
    { emoji: '🎵', label: '音楽',    desc: '音楽はこちら',         url: 'https://soundcloud.com/' },
    { emoji: '🔧', label: 'プラモの部屋',  desc: '製作記録など',         url: 'https://example.com/plamo' },
  ];

  const N = items.length;
  let current = Math.floor(Math.random() * N);
  const track = document.getElementById('track');
  const statusEl = document.getElementById('status-text');

  const nodes = items.map((item, i) => {
    const el = document.createElement('div');
    el.className = 'icon-item';
    el.innerHTML = `<div class="icon-img">${item.emoji}</div><div class="icon-label">${item.label}</div><div class="icon-desc">${item.desc}</div>`;
    el.addEventListener('click', () => { if (el.classList.contains('center')) window.open(item.url, '_blank'); });
    track.appendChild(el);
    return el;
  });

  function pos(o) {
    if (o === 0) return 'center';
    if (o === 1  || o === -(N-1)) return 'right1';
    if (o === 2  || o === -(N-2)) return 'right2';
    if (o === -1 || o === (N-1))  return 'left1';
    if (o === -2 || o === (N-2))  return 'left2';
    return 'hidden';
  }

  function render() {
    nodes.forEach((n, i) => {
      let o = i - current;
      if (o >  N / 2) o -= N;
      if (o < -N / 2) o += N;
      n.className = 'icon-item ' + pos(o);
    });
    statusEl.textContent = '▶ ' + items[current].label + ' ― ' + items[current].desc;
  }

  document.getElementById('btn-left').addEventListener('click',  () => { current = (current - 1 + N) % N; render(); });
  document.getElementById('btn-right').addEventListener('click', () => { current = (current + 1) % N;     render(); });

  let drag = null;
  track.addEventListener('mousedown',  e => { drag = e.clientX; });
  track.addEventListener('mouseup',    e => {
    if (drag !== null) {
      const dx = e.clientX - drag;
      if (dx < -30)      { current = (current + 1) % N;     render(); }
      else if (dx > 30)  { current = (current - 1 + N) % N; render(); }
      drag = null;
    }
  });
  track.addEventListener('touchstart', e => { drag = e.touches[0].clientX; }, { passive: true });
  track.addEventListener('touchend',   e => {
    if (drag !== null) {
      const dx = e.changedTouches[0].clientX - drag;
      if (dx < -30)      { current = (current + 1) % N;     render(); }
      else if (dx > 30)  { current = (current - 1 + N) % N; render(); }
      drag = null;
    }
  });

  document.addEventListener('keydown', e => {
    if (e.key === 'ArrowLeft')  { current = (current - 1 + N) % N; render(); }
    if (e.key === 'ArrowRight') { current = (current + 1) % N;     render(); }
    if (e.key === 'Enter')      window.open(items[current].url, '_blank');
  });

  render();
</script>
</body>
</html>
